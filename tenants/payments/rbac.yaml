apiVersion: v1
kind: ServiceAccount
metadata:
  name: payments-dev
  namespace: payments
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: payments-dev-role
  namespace: payments
rules:
  - apiGroups: ["", "apps", "networking.k8s.io", "batch", "autoscaling"]
    resources:
      - pods
      - pods/log
      - pods/exec
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
      - services
      - networkpolicies
      - jobs
      - cronjobs
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: payments-dev-rolebinding
  namespace: payments
subjects:
  - kind: ServiceAccount
    name: payments-dev
    namespace: payments
roleRef:
  kind: Role
  name: payments-dev-role
  apiGroup: rbac.authorization.k8s.io
