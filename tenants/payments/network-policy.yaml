apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: payments
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: egress-isolation
  namespace: payments
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    # 1. Allow traffic to pods in the same namespace (payments)
    - to:
        - podSelector: {}
    # 2. Allow DNS resolution to kube-system namespace
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
