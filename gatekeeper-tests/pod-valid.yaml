apiVersion: v1
kind: Pod
metadata:
  name: test-valid-pod
  namespace: default
spec:
  securityContext:
    runAsUser: 1000  # Hợp lệ: chạy với non-root (UID 1000)
    runAsGroup: 3000
    fsGroup: 2000
  containers:
  - name: nginx
    image: nginx:1.25.1  # Hợp lệ: đã gán nhãn tag version cụ thể
    resources:
      limits:
        cpu: 100m
        memory: 128Mi  # Hợp lệ: có đầy đủ resources.limits
      requests:
        cpu: 50m
        memory: 64Mi
